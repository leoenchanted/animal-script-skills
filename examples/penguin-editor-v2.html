<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企鹅科普文案</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #1c1c1e 0%, #2c2c2e 100%);
            color: #e5e5e7;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        /* ===== 主容器 ===== */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 16px;
            min-height: calc(100vh - 40px);
        }

        /* ===== 毛玻璃卡片基础样式 ===== */
        .glass-card {
            background: rgba(44, 44, 46, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* ===== 头部 ===== */
        .header {
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .header-buttons { display: flex; gap: 10px; }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.12);
            color: #e5e5e7;
        }

        .btn:hover { background: rgba(255, 255, 255, 0.18); }

        .btn-primary { background: #0a84ff; color: #fff; }
        .btn-primary:hover { background: #409cff; }

        /* ===== 主内容区（编辑 + 预览） ===== */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 14px 20px;
            font-size: 13px;
            font-weight: 500;
            color: #a1a1a6;
            background: rgba(28, 28, 30, 0.5);
            letter-spacing: 0.01em;
        }

        .editor {
            flex: 1;
            resize: none;
            padding: 20px;
            background: transparent;
            color: #d1d1d6;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 14px;
            line-height: 1.6;
            border: none;
            outline: none;
            overflow-y: auto;
        }

        .editor::-webkit-scrollbar { width: 6px; }
        .editor::-webkit-scrollbar-track { background: transparent; }
        .editor::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        .preview {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
        }

        .preview::-webkit-scrollbar { width: 6px; }
        .preview::-webkit-scrollbar-track { background: transparent; }
        .preview::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        /* ===== Markdown 渲染样式 ===== */
        .preview h1 { font-size: 1.8rem; font-weight: 700; color: #ffffff; margin-bottom: 16px; }
        .preview h2 { font-size: 1.4rem; font-weight: 600; color: #ffffff; margin: 28px 0 14px; }
        .preview h3 { font-size: 1.1rem; font-weight: 600; color: #f0f0f5; margin: 20px 0 10px; }
        .preview p { margin: 14px 0; color: #d1d1d6; font-size: 15px; }
        .preview strong { color: #ffffff; font-weight: 600; }
        .preview ul, .preview ol { margin: 14px 0; padding-left: 22px; }
        .preview li { margin: 6px 0; color: #d1d1d6; }
        .preview blockquote { background: rgba(255,255,255,0.08); padding: 14px 18px; margin: 16px 0; border-radius: 10px; color: #a1a1a6; }
        .preview code { background: rgba(255,255,255,0.12); padding: 3px 7px; border-radius: 6px; font-family: 'SF Mono', monospace; font-size: 13px; color: #f0f0f5; }
        .preview pre { background: rgba(0,0,0,0.25); padding: 14px; border-radius: 10px; overflow-x: auto; margin: 16px 0; }
        .preview a { color: #3b82f6; text-decoration: none; }
        .preview a:hover { text-decoration: underline; }
        .preview hr { border: none; height: 1px; background: rgba(255,255,255,0.1); margin: 24px 0; }
        .preview table { width: 100%; border-collapse: collapse; margin: 18px 0; }
        .preview th, .preview td { padding: 12px 14px; text-align: left; }
        .preview th { background: rgba(255,255,255,0.08); color: #ffffff; font-weight: 600; }
        .preview td { color: #d1d1d6; border-top: 1px solid rgba(255,255,255,0.08); }

        /* ===== 底部信息区 ===== */
        .bottom-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* ===== 图片画廊组件 ===== */
        .gallery-panel {
            padding: 20px;
        }

        .gallery-title {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 16px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .gallery-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
            aspect-ratio: 4/3;
        }

        .gallery-item:hover { transform: scale(1.03); }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item .label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            font-size: 11px;
            color: #a1a1a6;
        }

        .gallery-item .label a { color: #3b82f6; font-size: 10px; }

        /* ===== 参考来源组件 ===== */
        .references-panel {
            padding: 20px;
        }

        .references-title {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .reference-list {
            list-style: none;
        }

        .reference-list li {
            margin: 6px 0;
            padding: 10px 14px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .reference-list li:hover { background: rgba(255,255,255,0.12); }

        .reference-list li .icon { font-size: 14px; opacity: 0.7; }

        .reference-list li a { color: #3b82f6; text-decoration: none; font-size: 14px; }
        .reference-list li a:hover { text-decoration: underline; }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(44, 44, 46, 0.95);
            backdrop-filter: blur(20px);
            padding: 14px 24px;
            border-radius: 12px;
            color: #ffffff;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 800px) {
            .app-container { min-height: auto; }
            .main-content { grid-template-columns: 1fr; }
            .bottom-section { grid-template-columns: 1fr; }
            .gallery-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="header glass-card">
            <h1>🦁 企鹅科普文案</h1>
            <div class="header-buttons">
                <button class="btn" onclick="copyMarkdown()">复制原文</button>
                <button class="btn" onclick="copyHTML()">复制HTML</button>
                <button class="btn" onclick="downloadHTML()">保存</button>
                <button class="btn btn-primary" onclick="clearEditor()">清空</button>
            </div>
        </header>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 编辑器 -->
            <div class="panel glass-card">
                <div class="panel-header">编辑</div>
                <textarea class="editor" id="editor"># 🐧 企鹅：穿"西装"的南极生存狠人

## 📌 开篇悬念

你敢相信吗？眼前这只 **穿着黑白"西装"、走路摇摇晃晃的企鹅**，居然是地球上最抗冻的动物之一！它们能在 **-60°C的极寒风暴中抱团取暖**，潜水深度超过 **500米**，游泳速度可达 **35公里/小时**。

---

## 🔬 基本档案

| 项目 | 详情 |
|:---|:---|
| **学名** | Spheniscidae（企鹅科） |
| **种类** | 现存约 **18-20种** |
| **体长** | 30cm ~ 120cm |
| **体重** | 1kg ~ 40kg |
| **寿命** | 野生15-20年 |

---

## 🎨 外形特征

企鹅拥有标志性的 **黑白配色**——背部黑色，腹部雪白。这是完美的伪装：从上方看融入深色海洋，从下方看与明亮水面融为一体。

**身体特点**：
- 翅膀退化成鳍状肢，游泳效率极高
- 厚实羽毛层，约100根/平方厘米
- 脂肪储备达3-4cm厚

---

## 🏠 栖息环境

企鹅并非只生活在南极：
- **南极洲**：帝企鹅、阿德利企鹅
- **南美洲**：麦哲伦企鹅
- **非洲**：非洲企鹅
- **赤道**：加拉帕戈斯企鹅

---

## 🎭 生活习性

企鹅是典型的群居动物，繁殖期可聚集数万只。最经典的生存技能是 **抱团取暖**——群体中心温度可达37°C，节省50%能量。

---

## 🍽️ 饮食策略

企鹅是纯粹的肉食动物：
- 鱼类、磷虾、乌贼
- 游泳速度35km/h
- 可潜至500+米深

---

## 💕 繁殖方式

帝企鹅的雄性孵蛋传奇：
- 在-60°C风暴中站立65天
- 不吃不喝，体重减少40%
- 雌性归来后接力育幼

---

## 🛡️ 保护现状

帝企鹅为近危(NT)，非洲企鹅为濒危(EN)。主要威胁：气候变化、过度捕捞、海洋污染。

---

## 💡 趣味知识

1. 企鹅"膝盖"藏在身体里
2. 可以喝盐水，腺体过滤盐分
3. 加拉帕戈斯企鹅生活在赤道
4. 不会尿尿，尿酸直接排出
5. 跳岩企鹅能跳2米高

---

## 🌍 生存智慧

外表"呆萌"只是表象，真正的强者往往在看不见的地方默默坚持。</textarea>
            </div>

            <!-- 预览 -->
            <div class="panel glass-card">
                <div class="panel-header">预览</div>
                <div class="preview" id="preview"></div>
            </div>
        </div>

        <!-- 底部信息区 -->
        <div class="bottom-section">
            <!-- 图片画廊 -->
            <div class="gallery-panel glass-card">
                <div class="gallery-title">📷 图片画廊（点击在新页面打开）</div>
                <div class="gallery-grid" id="gallery"></div>
            </div>

            <!-- 参考来源 -->
            <div class="references-panel glass-card">
                <div class="references-title">📚 参考来源（点击在新页面打开）</div>
                <div id="references"></div>
            </div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const gallery = document.getElementById('gallery');
        const references = document.getElementById('references');

        marked.setOptions({ breaks: true, gfm: true });

        // 图片数据
        const images = [
            { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Emperor_Penguin_with_chick.jpg/300px-Emperor_Penguin_with_chick.jpg', source: 'Wikimedia', sourceUrl: 'https://commons.wikimedia.org/wiki/File:Emperor_Penguin_with_chick.jpg', desc: '帝企鹅与幼崽' },
            { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Emperor_penguins_with_chick.jpg/300px-Emperor_penguins_with_chick.jpg', source: 'Wikimedia', sourceUrl: 'https://commons.wikimedia.org/wiki/File:Emperor_penguins_with_chick.jpg', desc: '帝企鹅家族' },
            { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Emperor_penguin_chick_at_Snow_Hill_Island.jpg/300px-Emperor_penguin_chick_at_Snow_Hill_Island.jpg', source: 'Wikimedia', sourceUrl: 'https://commons.wikimedia.org/wiki/File:Emperor_penguin_chick_at_Snow_Hill_Island.jpg', desc: '企鹅幼崽' },
            { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Antarctica_655.jpg/300px-Antarctica_655.jpg', source: 'Wikimedia', sourceUrl: 'https://commons.wikimedia.org/wiki/File:Antarctica_655.jpg', desc: '栖息地' },
            { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Penguin_size_comparison.svg/400px-Penguin_size_comparison.svg.png', source: 'Wikimedia', sourceUrl: 'https://commons.wikimedia.org/wiki/File:Penguin_size_comparison.svg', desc: '种类对比' }
        ];

        const textSources = [
            { name: 'National Geographic', url: 'https://www.nationalgeographic.com/animals/birds/group/penguins/' },
            { name: 'IUCN Red List', url: 'https://www.iucnredlist.org/' },
            { name: 'Britannica', url: 'https://www.britannica.com/animal/penguin' },
            { name: 'WWF', url: 'https://www.worldwildlife.org/stories/antarctic-penguins' },
            { name: 'Wikipedia', url: 'https://en.wikipedia.org/wiki/Penguin' }
        ];

        const imageSources = images.map(img => ({ name: img.desc, url: img.sourceUrl }));

        function updatePreview() {
            preview.innerHTML = editor.value.trim() ? marked.parse(editor.value) : '<p style="color:#a1a1a6;text-align:center;padding:30px;">开始输入...</p>';
        }

        function renderGallery() {
            gallery.innerHTML = images.map(img => `
                <div class="gallery-item" onclick="window.open('${img.sourceUrl}', '_blank')">
                    <img src="${img.url}" alt="${img.desc}" onerror="this.parentElement.style.display='none'">
                    <div class="label">${img.desc}<br><a href="${img.sourceUrl}" target="_blank">${img.source}</a></div>
                </div>
            `).join('');
        }

        function renderReferences() {
            references.innerHTML = `
                <ul class="reference-list">
                    <li style="color:#a1a1a6;font-size:12px;font-weight:600;margin-bottom:8px;">文字来源</li>
                    ${textSources.map(s => `<li><span class="icon">📄</span><a href="${s.url}" target="_blank">${s.name}</a></li>`).join('')}
                </ul>
                <ul class="reference-list" style="margin-top:12px;">
                    <li style="color:#a1a1a6;font-size:12px;font-weight:600;margin-bottom:8px;">图片来源</li>
                    ${imageSources.map(s => `<li><span class="icon">📷</span><a href="${s.url}" target="_blank">${s.name}</a></li>`).join('')}
                </ul>
            `;
        }

        editor.addEventListener('input', updatePreview);

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            t.style.opacity = '1';
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, 1000);
        }

        function copyMarkdown() { navigator.clipboard.writeText(editor.value).then(() => showToast('已复制')); }
        function copyHTML() { navigator.clipboard.writeText(preview.innerHTML).then(() => showToast('已复制')); }

        function downloadHTML() {
            const css = `*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;max-width:800px;margin:40px auto;padding:20px;background:#f5f5f7;color:#1d1d1f;line-height:1.6}h1{font-size:1.8rem;margin-bottom:16px}h2{font-size:1.4rem;margin:28px 0 14px}p{margin:14px 0;color:#424245}strong{font-weight:600}table{width:100%;margin:18px 0}th,td{padding:12px}th{background:#e5e5e7}td{border-top:1px solid #d2d2d7}a{color:#0071e3}.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin:24px 0}.gallery-item{border-radius:10px;overflow:hidden}.gallery-item img{width:100%;aspect-ratio:4/3;object-fit:cover}.refs{margin:24px 0}.refs li{margin:6px 0;padding:10px;background:#e5e5e7;border-radius:8px}`;
            const html = `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>企鹅科普文案</title><style>${css}</style></head><body>${preview.innerHTML}<div class="gallery">${images.map(i=>`<div class="gallery-item"><a href="${i.sourceUrl}" target="_blank"><img src="${i.url}" alt="${i.desc}"></a></div>`).join('')}</div><div class="refs"><p style="font-weight:600;margin-bottom:12px">📚 参考来源</p><ul>${textSources.map(s=>`<li><a href="${s.url}" target="_blank">${s.name}</a></li>`).join('')}</ul></div></body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '企鹅科普文案.html';
            a.click();
            showToast('已保存');
        }

        function clearEditor() { if (confirm('确定清空？')) { editor.value = ''; updatePreview(); } }

        // 初始化
        updatePreview();
        renderGallery();
        renderReferences();
    </script>
</body>
</html>
