<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动物科普视频分镜工作台</title>
  <style>
    :root {
      --paper: #f6f3ea;
      --ink: #17211b;
      --muted: #667064;
      --line: #cbd2c3;
      --bamboo: #2f7a4f;
      --leaf: #8cb369;
      --coral: #e45745;
      --blue: #2d5f7a;
      --panel: #fffdf6;
      --shadow: 0 18px 50px rgba(34, 45, 36, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0.52)),
        repeating-linear-gradient(90deg, transparent 0 35px, rgba(47, 122, 79, 0.06) 35px 36px),
        var(--paper);
    }

    button,
    textarea {
      font: inherit;
    }

    .app {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: start;
      padding: 22px 0 18px;
      border-bottom: 2px solid var(--ink);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--bamboo);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 880px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 4vw, 64px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 8px;
      min-width: min(560px, 100%);
    }

    .metric {
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 4px 4px 0 rgba(23, 33, 27, 0.12);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 15px;
      line-height: 1.2;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 22px;
      margin-top: 22px;
      align-items: start;
    }

    .main {
      display: grid;
      gap: 16px;
    }

    .side {
      position: sticky;
      top: 18px;
      display: grid;
      gap: 16px;
    }

    .section,
    .shot-card {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .section {
      padding: 18px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .copy-btn,
    .ghost-btn {
      border: 1px solid var(--ink);
      background: var(--ink);
      color: white;
      min-height: 34px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .ghost-btn {
      background: transparent;
      color: var(--ink);
    }

    .copy-btn:hover,
    .ghost-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 rgba(23, 33, 27, 0.18);
    }

    .role-text,
    .voiceover {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border: 1px solid var(--line);
      background: #fffaf0;
      color: var(--ink);
      padding: 12px;
      line-height: 1.65;
      outline: none;
    }

    .voiceover {
      min-height: 320px;
    }

    .shot-card {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      overflow: hidden;
    }

    .shot-rail {
      padding: 16px 12px;
      background: var(--ink);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
    }

    .shot-number {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 42px;
      line-height: 1;
    }

    .shot-time {
      color: #dce8d7;
      font-size: 13px;
      font-weight: 800;
    }

    .shot-body {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .shot-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .field textarea {
      width: 100%;
      min-height: 96px;
      resize: vertical;
      border: 1px solid var(--line);
      background: #fffaf0;
      color: var(--ink);
      padding: 10px;
      line-height: 1.55;
      outline: none;
    }

    .field textarea.prompt {
      min-height: 138px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .fact {
      color: var(--blue);
      font-size: 13px;
      font-weight: 800;
    }

    .source-list {
      margin: 0;
      padding-left: 20px;
      line-height: 1.75;
    }

    .source-list a {
      color: var(--blue);
      text-decoration-thickness: 2px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: white;
      padding: 10px 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 10;
      box-shadow: 6px 6px 0 rgba(23, 33, 27, 0.18);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1100px) {
      .topbar,
      .workspace {
        grid-template-columns: 1fr;
      }

      .summary {
        min-width: 0;
      }

      .side {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 20px, 1440px);
        padding-top: 12px;
      }

      .summary,
      .shot-grid {
        grid-template-columns: 1fr;
      }

      .shot-card {
        grid-template-columns: 1fr;
      }

      .shot-rail {
        flex-direction: row;
        align-items: end;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Animal Video Script Desk</p>
        <h1>大熊猫科普短视频分镜工作台</h1>
      </div>
      <div class="summary" aria-label="视频概览">
        <div class="metric"><span>动物</span><strong>大熊猫</strong></div>
        <div class="metric"><span>时长</span><strong>约 75 秒</strong></div>
        <div class="metric"><span>镜头</span><strong>11 个</strong></div>
        <div class="metric"><span>风格</span><strong>卡通科普</strong></div>
      </div>
    </header>

    <main class="workspace">
      <section class="main" id="shotList" aria-label="分镜列表"></section>

      <aside class="side">
        <section class="section">
          <div class="section-title">
            <h2>统一角色设定</h2>
            <button class="ghost-btn" data-copy-target="roleSetting">复制</button>
          </div>
          <textarea class="role-text" id="roleSetting">主角是一只卡通大熊猫，圆脸，黑眼圈明显，身体胖乎乎，黑白毛色干净，表情灵动可爱。整体风格为高质量儿童科普动画，色彩明亮，柔和自然光，竹林背景清新，所有镜头保持同一角色外观和 16:9 横屏构图。通用负面限制：无文字、无水印、无 logo、不要真实照片风、不要畸形肢体、不要多余动物、不要恐怖血腥。</textarea>
        </section>

        <section class="section">
          <div class="section-title">
            <h2>完整口播稿</h2>
            <button class="ghost-btn" data-copy-target="voiceover">复制</button>
          </div>
          <textarea class="voiceover" id="voiceover">你敢相信吗？这只看起来只会卖萌的大熊猫，其实是竹林里的生存专家。

它的学名叫 Ailuropoda melanoleuca，是熊科成员，也属于食肉目。最反差的是，它身体结构更像食肉动物，却把竹子当成主食。

为了吃够能量，它一天可能要花 10 到 16 个小时觅食和进食。它还有一个隐藏工具：像拇指一样的腕骨，能帮它牢牢抓住竹子。

大熊猫的黑白配色也不只是好看，它可能帮助它在竹林和雪地里隐藏自己。虽然圆滚滚很亲切，但野外大熊猫大多独自生活，只在繁殖季更频繁交流。

熊猫妈妈的育幼也很不容易，幼崽出生时非常小，需要长时间照顾。今天，野外大熊猫仍然不多，栖息地破碎化依旧是主要威胁。

保护大熊猫，其实也在保护竹林里的许多其他生命。所以下次看到它卖萌，别忘了，它也是一位靠智慧活下来的竹林居民。</textarea>
        </section>

        <section class="section">
          <div class="section-title">
            <h2>事实来源</h2>
          </div>
          <ol class="source-list">
            <li><a href="https://nationalzoo.si.edu/animals/giant-panda" target="_blank" rel="noreferrer">Smithsonian National Zoo</a></li>
            <li><a href="https://www.worldwildlife.org/species/giant-panda/" target="_blank" rel="noreferrer">WWF Giant Panda</a></li>
            <li><a href="https://www.britannica.com/animal/giant-panda" target="_blank" rel="noreferrer">Britannica Giant Panda</a></li>
            <li><a href="https://www.iucnredlist.org/species/712/" target="_blank" rel="noreferrer">IUCN Red List</a></li>
          </ol>
        </section>
      </aside>
    </main>
  </div>

  <div class="toast" id="toast">已复制</div>

  <script>
    const shots = [

      {
        id: "10",
        time: "60-68s",

        promptEN: "Cartoon ecology education scene, a giant panda in the foreground of a bamboo forest, soft silhouettes of other forest animals in the background, showing umbrella species concept, bright natural colors, 16:9, no text, no watermark",

      },
      {
        id: "11",
        time: "68-76s",
        narration: "所以下次看到它卖萌，别忘了，它也是一位靠智慧活下来的竹林居民。",
        visual: "熊猫回望镜头，竹叶飘落，温暖收尾。",
        promptCN: "卡通短视频结尾画面，大熊猫在竹林小路上回望镜头，竹叶轻轻飘落，表情灵动可爱，温暖夕阳光，16:9，无文字，无水印",

        fact: "综合来源"

    ];

    const shotList = document.getElementById("shotList");
    const toast = document.getElementById("toast");

    function fieldTemplate(label, value, className = "") {
      return `
        <div class="field ${className}">
          <label>${label}</label>
          <textarea>${value}</textarea>
        </div>
      `;
    }

    function promptTemplate(label, value, id) {
      return `
        <div class="field">
          <label>${label}</label>
          <textarea class="prompt" id="${id}">${value}</textarea>
        </div>
      `;
    }

    function renderShots() {
      shotList.innerHTML = shots.map((shot) => `
        <article class="shot-card">
          <div class="shot-rail">
            <div class="shot-number">${shot.id}</div>
            <div class="shot-time">${shot.time}</div>
          </div>
          <div class="shot-body">
            <div class="shot-grid">
              ${fieldTemplate("解说词", shot.narration)}
              ${fieldTemplate("画面内容", shot.visual)}
              ${promptTemplate("中文生图提示词", shot.promptCN, `cn-${shot.id}`)}
              ${promptTemplate("English Prompt", shot.promptEN, `en-${shot.id}`)}
              ${fieldTemplate("动效建议", shot.motion)}
              <div class="field">
                <label>事实依据</label>
                <div class="fact">${shot.fact}</div>
              </div>
            </div>
            <div class="actions">
              <button class="copy-btn" data-copy-target="cn-${shot.id}">复制中文提示词</button>
              <button class="ghost-btn" data-copy-target="en-${shot.id}">复制 English Prompt</button>
            </div>
          </div>
        </article>
      `).join("");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1400);
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const helper = document.createElement("textarea");
      helper.value = text;
      helper.setAttribute("readonly", "");
      helper.style.position = "fixed";
      helper.style.left = "-9999px";
      document.body.appendChild(helper);
      helper.select();
      document.execCommand("copy");
      helper.remove();
    }

    document.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-copy-target]");
      if (!button) return;
      const target = document.getElementById(button.dataset.copyTarget);
      if (!target) return;
      await copyText(target.value || target.textContent || "");
      showToast("已复制到剪贴板");
    });

    renderShots();
  </script>
</body>
</html>
